version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: healthtech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthtech
      POSTGRES_PASSWORD: healthtech
      POSTGRES_DB: healthtech
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: